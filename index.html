<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎛️ 直播运营工作台</title>
<script src="chart.min.js"></script>
<style>
:root {
  --accent: #e74c3c; --accent-light: #fce4e4; --green: #27ae60; --green-light: #e8f5e9;
  --blue: #2980b9; --blue-light: #e3f2fd; --orange: #f39c12; --orange-light: #fff8e1;
  --bg: #f8f9fa; --card: #fff; --text: #1a1a1a; --text2: #666; --border: #e0e0e0;
  --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* Login Overlay */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px}
.login-overlay h1{font-size:24px}
.login-overlay input{padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:16px;width:280px;text-align:center;font-family:inherit}
.login-overlay input:focus{outline:none;border-color:var(--accent)}
.login-overlay button{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.login-overlay .error{color:var(--accent);font-size:14px}
.login-overlay .hint{color:var(--text2);font-size:12px}

.top-nav{display:flex;justify-content:center;gap:4px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow);flex-wrap:wrap}
.top-nav button{padding:8px 16px;border:none;background:transparent;border-radius:20px;cursor:pointer;font-size:14px;color:var(--text2);transition:all .2s;font-weight:500;white-space:nowrap}
.top-nav button.active{background:var(--accent);color:#fff;font-weight:600}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100}
.bottom-nav button{flex:1;padding:8px 2px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav button .icon{font-size:18px}
.bottom-nav button.active{color:var(--accent);font-weight:600}

.page-container{max-width:800px;margin:0 auto;padding:16px}
.page{display:none}
.page.active{display:block}

.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--text2)}

.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;margin-bottom:4px;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-green{background:var(--green);color:#fff}

/* Cards */
.script-card,.light-card,.streamer-card{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.script-card .sc-title{font-weight:600;font-size:14px;margin-bottom:4px}
.script-card .sc-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
.script-card .sc-actions,.light-card .lc-actions,.streamer-card .st-actions{display:flex;gap:6px}

.chip{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.chip-red{background:var(--accent-light);color:var(--accent)}
.chip-green{background:var(--green-light);color:var(--green)}
.chip-blue{background:var(--blue-light);color:var(--blue)}

.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag-row button{padding:4px 12px;border:1px solid var(--border);background:#fff;border-radius:14px;cursor:pointer;font-size:12px}
.tag-row button.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}

.recap-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.recap-metric{background:var(--bg);padding:12px;border-radius:8px;text-align:center}
.recap-metric .rm-val{font-size:22px;font-weight:700;color:var(--accent)}
.recap-metric .rm-label{font-size:11px;color:var(--text2);margin-top:2px}

.chart-wrapper{position:relative;height:260px;margin:12px 0}

.hourly-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px}
@media(min-width:768px){.hourly-grid{grid-template-columns:repeat(8,1fr)}}
.hourly-item{text-align:center}
.hourly-item input{width:100%;padding:6px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:13px}
.hourly-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:2px}

.worklog-entry{border-left:3px solid var(--accent);padding:8px 12px;margin-bottom:8px;background:var(--bg);border-radius:0 8px 8px 0}
.worklog-entry .wl-time{font-size:11px;color:var(--text2)}
.worklog-entry .wl-content{font-size:13px;margin-top:3px}

.status-bar{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text2);padding:4px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.status-bar .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.status-bar .dot.online{background:var(--green)}
.status-bar .dot.offline{background:var(--orange)}

@media(max-width:640px){
  .top-nav{display:none}.bottom-nav{display:flex}.page-container{padding:10px}.card{padding:14px}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .recap-metrics{grid-template-columns:1fr 1fr}.hourly-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <h1>🎛️ 运营工作台</h1>
  <input type="password" id="loginPassword" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">🔓 登录</button>
  <div class="error" id="loginError"></div>
  <div class="hint">默认密码：admin123（登录后在设置页修改）</div>
</div>

<!-- STATUS BAR -->
<div class="status-bar" id="statusBar" style="display:none">
  <span><span class="dot online" id="syncDot"></span> <span id="syncStatus">已同步</span></span>
  <span><span id="currentUser"></span> · <a href="#" onclick="logout()" style="color:var(--accent)">退出</a></span>
</div>

<!-- TOP NAV -->
<nav class="top-nav" id="topNav" style="display:none">
  <button data-page="scripts" class="active">🎤 话术库</button>
  <button data-page="lighting">💡 灯光库</button>
  <button data-page="streamers">📊 主播</button>
  <button data-page="recap">📝 复盘</button>
  <button data-page="worklog">📋 日志</button>
  <button data-page="settings">⚙️ 设置</button>
</nav>

<div class="page-container">

<!-- SCRIPTS -->
<div class="page active" id="page-scripts">
  <div class="card"><h2>🎤 话术库</h2>
    <div class="tag-row" id="scriptCatTags"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="scriptSearch" placeholder="🔍 搜索..." style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px" oninput="renderScripts()">
      <button class="btn btn-outline btn-sm" onclick="toggleAddScript()">+ 添加</button></div>
    <div id="addScriptForm" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px">
      <div class="form-group"><label>场景分类</label><select id="newScriptCat"></select></div>
      <div class="form-group"><label>话术标题</label><input type="text" id="newScriptTitle"></div>
      <div class="form-group"><label>话术内容</label><textarea id="newScriptBody" rows="3"></textarea></div>
      <button class="btn btn-primary btn-sm" onclick="addScript()">保存</button></div>
    <div id="scriptList"></div></div>
</div>

<!-- LIGHTING -->
<div class="page" id="page-lighting">
  <div class="card"><h2>💡 灯光方案库</h2>
    <button class="btn btn-outline btn-sm" style="margin-bottom:12px" onclick="toggleAddLight()">+ 添加方案</button>
    <div id="addLightForm" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px">
      <div class="form-group"><label>方案名称</label><input type="text" id="newLightName"></div>
      <div class="form-group"><label>适合风格</label><input type="text" id="newLightStyle"></div>
      <div class="form-row"><div class="form-group"><label>主灯</label><input type="text" id="newLightMain"></div><div class="form-group"><label>辅灯</label><input type="text" id="newLightFill"></div></div>
      <div class="form-row"><div class="form-group"><label>轮廓灯</label><input type="text" id="newLightRim"></div><div class="form-group"><label>美颜参数</label><input type="text" id="newLightBeauty"></div></div>
      <div class="form-group"><label>备注</label><textarea id="newLightNote" rows="2"></textarea></div>
      <button class="btn btn-primary btn-sm" onclick="addLight()">保存方案</button></div>
    <div id="lightList"></div></div>
</div>

<!-- STREAMERS -->
<div class="page" id="page-streamers">
  <div class="card"><h2>📊 主播管理</h2>
    <button class="btn btn-outline btn-sm" style="margin-bottom:12px" onclick="toggleAddStreamer()">+ 添加主播</button>
    <div id="addStreamerForm" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px">
      <div class="form-row"><div class="form-group"><label>主播昵称</label><input type="text" id="newStreamerName"></div>
      <div class="form-group"><label>平台</label><select id="newStreamerPlatform"><option>抖音</option><option>快手</option><option>B站</option><option>视频号</option></select></div></div>
      <div class="form-group"><label>备注</label><input type="text" id="newStreamerNote"></div>
      <button class="btn btn-primary btn-sm" onclick="addStreamer()">添加</button></div>
    <div id="streamerList"></div></div>
</div>

<!-- RECAP -->
<div class="page" id="page-recap">
  <div class="card"><h2>📝 每日复盘</h2>
    <div class="form-row"><div class="form-group"><label>主播</label><select id="recapStreamer" onchange="onRecapChange()"></select></div>
    <div class="form-group"><label>日期</label><input type="date" id="recapDate" onchange="onRecapChange()"></div></div>
    <details style="margin-bottom:12px;font-size:13px;color:var(--text2)"><summary>🤖 AI 生成设置（可选）</summary>
      <div style="margin-top:8px"><div class="form-row"><div class="form-group"><label>AI 模型</label><select id="aiModel" onchange="onAiModelChange()">
        <option value="claude">Claude</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option><option value="custom">自定义</option></select></div>
      <div class="form-group"><label>API Key</label><div style="display:flex;gap:6px"><input type="password" id="apiKey" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px"><button class="btn btn-outline btn-sm" onclick="saveApiKey()">保存</button></div></div></div>
      <div id="customEndpointRow" style="display:none"><div class="form-row"><div class="form-group"><label>API 地址</label><input type="text" id="customEndpoint"></div><div class="form-group"><label>模型名</label><input type="text" id="customModel"></div></div></div></div></details>

    <h3>📊 基础数据（从抖音后台对照复制）</h3>
    <div class="form-row-3"><div class="form-group"><label>场观</label><input type="number" id="recapViews"></div><div class="form-group"><label>峰值在线</label><input type="number" id="recapPeak"></div><div class="form-group"><label>停留(秒)</label><input type="number" id="recapStay"></div></div>
    <div class="form-row-3"><div class="form-group"><label>新增粉丝</label><input type="number" id="recapFans"></div><div class="form-group"><label>礼物收入(元)</label><input type="number" id="recapIncome"></div><div class="form-group"><label>付费人数</label><input type="number" id="recapPayers"></div></div>
    <h3>🎁 礼物拆解</h3><div class="form-row"><div class="form-group"><label>大礼物个数</label><input type="number" id="recapBigGift"></div><div class="form-group"><label>大礼物总额</label><input type="number" id="recapBigGiftAmt"></div></div>
    <h3>🆚 PK记录</h3><div class="form-row"><div class="form-group"><label>PK次数</label><input type="number" id="recapPKCount"></div><div class="form-group"><label>赢几场</label><input type="number" id="recapPKWin"></div></div>
    <h3>📈 在线人数（每小时取点）</h3><div class="hourly-grid" id="hourlyGrid"></div>
    <div class="form-row" style="margin-top:8px"><div class="form-group"><label>峰值时间</label><input type="time" id="recapPeakTime"></div><div class="form-group"><label>低谷时间</label><input type="time" id="recapLowTime"></div></div>
    <h3>🔑 关键时间节点</h3><div id="keyMoments"><div class="form-row" style="margin-bottom:4px"><div class="form-group"><input type="time" class="km-time"></div><div class="form-group"><input type="text" class="km-event" placeholder="发生了什么"></div></div></div>
    <button class="btn btn-outline btn-sm" onclick="addKeyMoment()" style="margin-bottom:12px">+ 加节点</button>
    <div style="display:flex;gap:8px;margin-bottom:16px"><button class="btn btn-primary" onclick="generateReview()">🤖 生成复盘报告</button><button class="btn btn-outline" onclick="autoFillYesterday()">📥 预填昨天</button></div></div>
  <div class="card" id="generatedReviewCard" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="margin:0">📋 复盘报告</h2><button class="btn btn-green btn-sm" onclick="copyReview()">📋 一键复制</button></div><div id="generatedReview" style="line-height:1.8;font-size:14px;white-space:pre-wrap"></div><button class="btn btn-primary" onclick="saveRecap()" style="margin-top:12px">💾 保存复盘</button></div>
  <div class="card"><h3>📈 7天趋势</h3><div class="chart-wrapper"><canvas id="recapChart"></canvas></div></div>
  <div class="card"><h3>📋 复盘历史</h3><div id="recapHistory"></div></div>
</div>

<!-- WORK LOG -->
<div class="page" id="page-worklog">
  <div class="card"><h2>📋 工作日志 — <span id="wlDate"></span></h2>
    <div style="display:flex;gap:8px;margin-bottom:12px"><input type="time" id="wlTime" style="padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px"><input type="text" id="wlContent" placeholder="做了什么..." style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px"><button class="btn btn-green btn-sm" onclick="addWorkLog()">+</button></div>
    <div id="workLogList"></div></div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="card"><h2>⚙️ 设置</h2>
    <div class="form-group"><label>修改密码</label><input type="password" id="newPassword" placeholder="输入新密码"></div>
    <button class="btn btn-primary" onclick="changePassword()">🔒 修改密码</button></div>
  <div class="card"><button class="btn btn-outline" onclick="logout()" style="width:100%;color:var(--accent);border-color:var(--accent)">🚪 退出登录</button></div>
</div>

</div><!-- page-container -->

<nav class="bottom-nav" id="bottomNav" style="display:none">
  <button data-page="scripts" class="active"><span class="icon">🎤</span>话术</button>
  <button data-page="lighting"><span class="icon">💡</span>灯光</button>
  <button data-page="streamers"><span class="icon">📊</span>主播</button>
  <button data-page="recap"><span class="icon">📝</span>复盘</button>
  <button data-page="worklog"><span class="icon">📋</span>日志</button>
  <button data-page="settings"><span class="icon">⚙️</span>设置</button>
</nav>

<script>
// ==================== SUPABASE REST API ====================
const SB_URL='https://xyeecqpbaxzjrbukipyi.supabase.co';
const SB_KEY='sb_publishable_vtschTBXX1hOhJ0BYLbOag_jsU2yL4m';

function sbHeaders(){
  return {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
}

async function sbGet(table,query=''){
  const url=`${SB_URL}/rest/v1/${table}?${query}`;
  const resp=await fetch(url,{headers:sbHeaders()});
  if(!resp.ok)throw new Error(await resp.text());
  return resp.json();
}

async function sbPost(table,data){
  const resp=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:sbHeaders(),body:JSON.stringify(data)});
  if(!resp.ok)throw new Error(await resp.text());
  return resp.json();
}

async function sbPatch(table,id,data){
  const resp=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:sbHeaders(),body:JSON.stringify(data)});
  if(!resp.ok)throw new Error(await resp.text());
}

async function sbDelete(table,id){
  const resp=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:sbHeaders()});
  if(!resp.ok)throw new Error(await resp.text());
}

let loggedIn=false;
let currentPassword='';
let D={scripts:[],lighting:[],streamers:[],recaps:[],workLogs:{}};

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('loginError').textContent='⏳ 连接中...';
  checkSession();
});

// ==================== AUTH ====================
async function doLogin(){
  const pw=document.getElementById('loginPassword').value;
  if(!pw)return;
  document.getElementById('loginError').textContent='⏳ 验证中...';
  try{
    const rows=await sbGet('config','select=value&key=eq.password');
    if(!rows||rows.length===0){document.getElementById('loginError').textContent='❌ 未找到密码，请先运行SQL建表';return}
    if(rows[0].value!==pw){document.getElementById('loginError').textContent='❌ 密码错误';return}
    currentPassword=pw;
    sessionStorage.setItem('liveops_pw',pw);
    loggedIn=true;
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('statusBar').style.display='flex';
    document.getElementById('topNav').style.display='flex';
    document.getElementById('bottomNav').style.display='flex';
    await loadAllData();
    initApp();
  }catch(e){
    document.getElementById('loginError').textContent='❌ 网络错误: '+e.message+'. 可能是Supabase连不上';
  }
}

async function changePassword(){
  const np=document.getElementById('newPassword').value.trim();
  if(!np)return alert('请输入新密码');
  try{
    await fetch(`${SB_URL}/rest/v1/config?key=eq.password`,{method:'PATCH',headers:sbHeaders(),body:JSON.stringify({value:np})});
    currentPassword=np;
    sessionStorage.setItem('liveops_pw',np);
    alert('✅ 密码已修改！');
  }catch(e){alert('修改失败: '+e.message)}
}

function logout(){
  sessionStorage.removeItem('liveops_pw');
  location.reload();
}

async function checkSession(){
  const saved=sessionStorage.getItem('liveops_pw');
  if(saved){
    try{
      const rows=await sbGet('config','select=value&key=eq.password');
      if(rows&&rows.length>0&&rows[0].value===saved){
        currentPassword=saved;
        loggedIn=true;
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('statusBar').style.display='flex';
        document.getElementById('topNav').style.display='flex';
        document.getElementById('bottomNav').style.display='flex';
        await loadAllData();
        initApp();
        return;
      }
    }catch(e){}
  }
  document.getElementById('loginOverlay').style.display='flex';
}

// ==================== DATA SYNC ====================
async function loadAllData(){
  document.getElementById('syncStatus').textContent='同步中...';
  try{
    const[scr,lig,str,rec,wl]=await Promise.all([
      sbGet('scripts','select=*&order=id.asc'),
      sbGet('lighting','select=*&order=id.asc'),
      sbGet('streamers','select=*&order=id.asc'),
      sbGet('recaps','select=*&order=date.desc'),
      sbGet('work_logs','select=*&order=date.desc,time.asc')
    ]);
    D.scripts=scr||[];
    D.lighting=lig||[];
    D.streamers=str||[];
    D.recaps=rec||[];
    D.workLogs={};
    (wl||[]).forEach(l=>{if(!D.workLogs[l.date])D.workLogs[l.date]=[];D.workLogs[l.date].push(l)});
    document.getElementById('syncDot').className='dot online';
    document.getElementById('syncStatus').textContent='已同步';
  }catch(e){
    document.getElementById('syncDot').className='dot offline';
    document.getElementById('syncStatus').textContent='离线: '+e.message;
  }
}

async function syncNow(){
  document.getElementById('syncStatus').textContent='同步中...';
  await loadAllData();
  renderPage();
}

// ==================== NAV ====================
let currentPage='scripts';
function switchPage(name){
  currentPage=name;
  if(!loggedIn)return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.top-nav button,.bottom-nav button').forEach(b=>b.classList.remove('active'));
  const pg=document.getElementById('page-'+name);if(pg)pg.classList.add('active');
  document.querySelectorAll('[data-page="'+name+'"]').forEach(b=>b.classList.add('active'));
  renderPage();
}
function renderPage(){
  if(currentPage==='scripts')renderScripts();
  if(currentPage==='lighting')renderLights();
  if(currentPage==='streamers')renderStreamers();
  if(currentPage==='recap')initRecap();
  if(currentPage==='worklog')renderWorkLog();
}

document.getElementById('topNav').addEventListener('click',e=>{if(e.target.dataset.page)switchPage(e.target.dataset.page)});
document.getElementById('bottomNav').addEventListener('click',e=>{const b=e.target.closest('button');if(b&&b.dataset.page)switchPage(b.dataset.page)});

// ==================== SCRIPTS ====================
let scriptCat='全部';
const SCRIPT_CATS=['全部','开场','感谢','PK','拉票','下播','大哥','日常'];
function renderScripts(){
  document.getElementById('scriptCatTags').innerHTML=SCRIPT_CATS.map(c=>`<button class="${c===scriptCat?'active':''}" onclick="scriptCat='${c}';renderScripts()">${c}</button>`).join('');
  document.getElementById('newScriptCat').innerHTML=SCRIPT_CATS.filter(c=>c!=='全部').map(c=>`<option>${c}</option>`).join('');
  const q=(document.getElementById('scriptSearch').value||'').toLowerCase();
  let list=D.scripts;
  if(scriptCat!=='全部')list=list.filter(s=>s.cat===scriptCat);
  if(q)list=list.filter(s=>s.title.toLowerCase().includes(q)||s.body.toLowerCase().includes(q));
  document.getElementById('scriptList').innerHTML=list.map(s=>`<div class="script-card">
    <div class="sc-title">${s.title}<span class="chip chip-red">${s.cat}</span></div>
    <div class="sc-body">${s.body}</div><div class="sc-actions">
    <button class="btn btn-outline btn-sm" onclick="copyScript(${s.id})">📋 复制</button>
    <button class="btn btn-sm" style="color:var(--accent);background:var(--accent-light)" onclick="deleteScript(${s.id})">删除</button></div></div>`).join('')||'<p style="text-align:center;color:var(--text2);padding:20px">暂无话术</p>';
}
function toggleAddScript(){document.getElementById('addScriptForm').style.display=document.getElementById('addScriptForm').style.display==='none'?'block':'none'}
async function addScript(){
  const cat=document.getElementById('newScriptCat').value,title=document.getElementById('newScriptTitle').value.trim(),body=document.getElementById('newScriptBody').value.trim();
  if(!title||!body)return alert('请填写完整');
  try{await sbPost('scripts',{cat,title,body})}catch(e){return alert('保存失败: '+e.message)}
  document.getElementById('newScriptTitle').value='';document.getElementById('newScriptBody').value='';
  document.getElementById('addScriptForm').style.display='none';
  await loadAllData();renderScripts();
}
async function deleteScript(id){if(confirm('删除？')){await sbDelete('scripts',id);await loadAllData();renderScripts()}}
function copyScript(id){const s=D.scripts.find(x=>x.id===id);if(s)navigator.clipboard.writeText(s.body).then(()=>alert('✅ 已复制'));}

// ==================== RECAP ====================
let recapChart=null,generatedReviewText='';
function initRecap(){
  document.getElementById('recapDate').value=today();
  ['apiKey'].forEach(id=>document.getElementById(id).value=getApiKey());
  document.getElementById('aiModel').value=getAiModel();
  document.getElementById('customEndpoint').value=getCustomEp();
  document.getElementById('customModel').value=getCustomModel();
  onAiModelChange();
  renderStreamers();
  renderHourlyGrid();
  renderRecapHistory();
  renderRecapChart();
  document.getElementById('generatedReviewCard').style.display='none';
}
function onRecapChange(){initRecap()}
function renderHourlyGrid(){document.getElementById('hourlyGrid').innerHTML=Array.from({length:24},(_,i)=>`<div class="hourly-item"><label>${i}:00</label><input type="number" id="hv_${i}" min="0"></div>`).join('')}
function addKeyMoment(){const div=document.createElement('div');div.className='form-row';div.style.marginBottom='4px';div.innerHTML='<div class="form-group"><input type="time" class="km-time"></div><div class="form-group"><input type="text" class="km-event" placeholder="发生了什么"></div>';document.getElementById('keyMoments').appendChild(div)}
function getKeyMoments(){const ts=document.querySelectorAll('.km-time'),es=document.querySelectorAll('.km-event'),r=[];for(let i=0;i<ts.length;i++){if(ts[i].value&&es[i].value)r.push({time:ts[i].value,event:es[i].value.trim()})}return r}
function getRecapData(){const h={};for(let i=0;i<24;i++){const v=+document.getElementById('hv_'+i).value;if(v)h[i]=v}return{date:document.getElementById('recapDate').value,streamer:document.getElementById('recapStreamer').value,views:+document.getElementById('recapViews').value||0,peak:+document.getElementById('recapPeak').value||0,stay:+document.getElementById('recapStay').value||0,fans:+document.getElementById('recapFans').value||0,income:+document.getElementById('recapIncome').value||0,payers:+document.getElementById('recapPayers').value||0,big_gift:+document.getElementById('recapBigGift').value||0,big_gift_amt:+document.getElementById('recapBigGiftAmt').value||0,pk_count:+document.getElementById('recapPKCount').value||0,pk_win:+document.getElementById('recapPKWin').value||0,hourly:h,peak_time:document.getElementById('recapPeakTime').value,low_time:document.getElementById('recapLowTime').value,key_moments:getKeyMoments()}}

function pct(a,b){if(!b)return'--';const v=((a-b)/b*100);return(v>=0?'+':'')+v.toFixed(1)+'%'}
function findPrev(sn,date){const d=new Date(date);d.setDate(d.getDate()-1);const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return D.recaps.find(r=>r.streamer===sn&&r.date===ds)||null}

function autoFillYesterday(){
  const yd=new Date();yd.setDate(yd.getDate()-1);const ds=yd.getFullYear()+'-'+String(yd.getMonth()+1).padStart(2,'0')+'-'+String(yd.getDate()).padStart(2,'0'),sn=document.getElementById('recapStreamer').value,prev=D.recaps.filter(r=>r.date===ds&&r.streamer===sn)[0];
  if(!prev)return alert('没有昨天的数据');
  ['views','peak','stay','fans','income','payers','big_gift','big_gift_amt','pk_count','pk_win'].forEach(k=>{const el=document.getElementById('recap'+k.charAt(0).toUpperCase()+k.slice(1));if(el)el.value=prev[k]||''});
  for(let i=0;i<24;i++){const el=document.getElementById('hv_'+i);if(el&&prev.hourly&&prev.hourly[i])el.value=prev.hourly[i]}
  if(prev.peak_time)document.getElementById('recapPeakTime').value=prev.peak_time;
  if(prev.low_time)document.getElementById('recapLowTime').value=prev.low_time;
}

// AI functions
function getApiKey(){return localStorage.getItem('liveops_apikey')||''}
function getAiModel(){return localStorage.getItem('liveops_aimodel')||'claude'}
function getCustomEp(){return localStorage.getItem('liveops_custom_ep')||''}
function getCustomModel(){return localStorage.getItem('liveops_custom_model')||''}
function saveApiKey(){const k=document.getElementById('apiKey').value.trim(),m=document.getElementById('aiModel').value;localStorage.setItem('liveops_apikey',k);localStorage.setItem('liveops_aimodel',m);if(m==='custom'){localStorage.setItem('liveops_custom_ep',document.getElementById('customEndpoint').value.trim());localStorage.setItem('liveops_custom_model',document.getElementById('customModel').value.trim())}alert(k?'✅ 已保存':'✅ 已清除')}
function onAiModelChange(){document.getElementById('customEndpointRow').style.display=document.getElementById('aiModel').value==='custom'?'block':'none'}

async function generateReview(){
  const r=getRecapData();if(!r.streamer)return alert('请选择主播');
  const key=getApiKey();document.getElementById('generatedReviewCard').style.display='block';
  if(key){document.getElementById('generatedReview').textContent='⏳ AI 生成中...';
    try{generatedReviewText=await callAI(key,getAiModel(),r)}catch(e){generatedReviewText='❌ AI失败（'+e.message+'）\n\n'+ruleBasedReview(r)}
  }else{generatedReviewText=ruleBasedReview(r)}
  document.getElementById('generatedReview').textContent=generatedReviewText;
  window._lastRecapData=r;window.scrollTo({top:document.getElementById('generatedReviewCard').offsetTop-20,behavior:'smooth'});
}

async function callAI(apiKey,model,r){
  const prev=findPrev(r.streamer,r.date);const sysPrompt='你是直播运营复盘教练。根据数据生成300字中文复盘：数据总览、亮点、待改进、明日建议。用数据说话。';
  const prompt='直播数据：'+JSON.stringify({...r,yesterday:prev||null});
  let url,headers,body;
  if(model==='claude'){url='https://api.anthropic.com/v1/messages';headers={'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'};body=JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sysPrompt,messages:[{role:'user',content:prompt}]})}
  else if(model==='deepseek'){url='https://api.deepseek.com/v1/chat/completions';headers={'Content-Type':'application/json','Authorization':'Bearer '+apiKey};body=JSON.stringify({model:'deepseek-chat',max_tokens:800,messages:[{role:'system',content:sysPrompt},{role:'user',content:prompt}]})}
  else if(model==='openai'){url='https://api.openai.com/v1/chat/completions';headers={'Content-Type':'application/json','Authorization':'Bearer '+apiKey};body=JSON.stringify({model:'gpt-4o-mini',max_tokens:800,messages:[{role:'system',content:sysPrompt},{role:'user',content:prompt}]})}
  else{url=getCustomEp();headers={'Content-Type':'application/json','Authorization':'Bearer '+apiKey};body=JSON.stringify({model:getCustomModel()||'gpt-4o-mini',max_tokens:800,messages:[{role:'system',content:sysPrompt},{role:'user',content:prompt}]})}
  const resp=await fetch(url,{method:'POST',headers,body});if(!resp.ok){const e=await resp.text();throw new Error(e.slice(0,150))}
  const d=await resp.json();let t=model==='claude'?d.content[0].text:d.choices[0].message.content;return t+'\n\n───\n🤖'+model.toUpperCase();
}

function ruleBasedReview(r){
  const prev=findPrev(r.streamer,r.date);let rep=`📊 ${r.streamer} · ${r.date} 复盘\n${'─'.repeat(40)}\n\n📈 数据\n场观${r.views}${prev?'('+pct(r.views,prev.views)+')':''} 峰值${r.peak}人 停留${r.stay}s 粉${r.fans} 收入¥${r.income} 付费${r.payers}人`;if(r.big_gift)rep+=` 大礼${r.big_gift}个/¥${r.big_gift_amt}`;if(r.pk_count)rep+=` PK${r.pk_count}场赢${r.pk_win}`;const hl=[],is=[];if(prev){if(r.income>prev.income*1.2)hl.push('收入大涨'+pct(r.income,prev.income));if(r.income<prev.income*.8)is.push('收入下滑'+pct(r.income,prev.income));if(r.stay>prev.stay*1.1)hl.push('停留提升');if(r.stay<prev.stay*.9)is.push('停留下降');}if(hl.length)rep+='\n\n🌟亮点\n'+hl.map(h=>'✅'+h).join('\n');if(is.length)rep+='\n\n⚠️待改进\n'+is.map(i=>'❌'+i).join('\n');rep+='\n\n💡建议：保持灯光质量，准备互动话题，主动引导礼物。\n'+'─'.repeat(40)+'\n📝补充笔记：\n（手动填写...）';return rep}

function copyReview(){navigator.clipboard.writeText(generatedReviewText).then(()=>alert('✅ 已复制'))}

async function saveRecap(){
  const r=window._lastRecapData||getRecapData();if(!r.streamer)return alert('请选择主播');
  const existing=D.recaps.find(x=>x.date===r.date&&x.streamer===r.streamer);
  try{if(existing)await sbPatch('recaps',existing.id,r);else await sbPost('recaps',r)}catch(e){return alert('保存失败: '+e.message)}
  await loadAllData();renderRecapHistory();renderRecapChart();alert('✅ 已保存');
}

function renderRecapHistory(){
  const sn=document.getElementById('recapStreamer').value,list=sn?D.recaps.filter(r=>r.streamer===sn):D.recaps;
  document.getElementById('recapHistory').innerHTML=list.slice(0,30).map(r=>`<div class="script-card" style="cursor:pointer" onclick="loadRecap('${r.id}')"><div style="display:flex;justify-content:space-between"><strong>${r.date}·${r.streamer}</strong><span>💰${r.income}元👥${r.views}</span></div></div>`).join('')||'<p style="text-align:center;color:var(--text2);padding:20px">暂无记录</p>';
}

function loadRecap(id){
  const r=D.recaps.find(x=>x.id===id);if(!r)return;
  document.getElementById('recapStreamer').value=r.streamer;document.getElementById('recapDate').value=r.date;
  ['views','peak','stay','fans','income','payers','big_gift','big_gift_amt','pk_count','pk_win'].forEach(k=>{const el=document.getElementById('recap'+k.charAt(0).toUpperCase()+k.slice(1));if(el)el.value=r[k]||''});
  for(let i=0;i<24;i++){const el=document.getElementById('hv_'+i);if(el)el.value=(r.hourly&&r.hourly[i])||''}
  document.getElementById('recapPeakTime').value=r.peak_time||'';document.getElementById('recapLowTime').value=r.low_time||'';
  document.getElementById('keyMoments').innerHTML='<div class="form-row" style="margin-bottom:4px"><div class="form-group"><input type="time" class="km-time"></div><div class="form-group"><input type="text" class="km-event" placeholder="发生了什么"></div></div>';
  if(r.key_moments)r.key_moments.forEach(km=>{addKeyMoment();const rows=document.querySelectorAll('#keyMoments .form-row'),last=rows[rows.length-1];last.querySelector('.km-time').value=km.time;last.querySelector('.km-event').value=km.event});
  switchPage('recap');
}

function renderRecapChart(){
  const sn=document.getElementById('recapStreamer').value,recaps=(sn?D.recaps.filter(r=>r.streamer===sn):D.recaps).slice(0,30).reverse();
  const ctx=document.getElementById('recapChart').getContext('2d');if(recapChart)recapChart.destroy();if(!recaps.length){recapChart=null;return}
  recapChart=new Chart(ctx,{type:'line',data:{labels:recaps.map(r=>r.date.slice(5)),datasets:[{label:'收入(元)',data:recaps.map(r=>r.income),borderColor:'#e74c3c',tension:.3,pointRadius:3,yAxisID:'y'},{label:'场观',data:recaps.map(r=>r.views),borderColor:'#2980b9',tension:.3,pointRadius:3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{type:'linear',position:'left',title:{display:true,text:'收入'}},y1:{type:'linear',position:'right',title:{display:true,text:'场观'},grid:{drawOnChartArea:false}}}}});
}

// ==================== WORK LOG ====================
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function renderWorkLog(){
  const td=today();document.getElementById('wlDate').textContent=td;document.getElementById('wlTime').value=new Date().toTimeString().slice(0,5);
  const logs=D.workLogs[td]||[];
  document.getElementById('workLogList').innerHTML=logs.map((l,i)=>`<div class="worklog-entry"><div class="wl-time">${l.time}</div><div class="wl-content">${l.content}</div><button class="btn btn-sm" style="color:var(--accent);margin-top:4px" onclick="deleteWorkLog(${l.id})">删除</button></div>`).join('')||'<p style="text-align:center;color:var(--text2);padding:20px">暂无记录</p>';
}
async function addWorkLog(){
  const td=today(),time=document.getElementById('wlTime').value,content=document.getElementById('wlContent').value.trim();
  if(!time||!content)return;
  try{await sbPost('work_logs',{date:td,time,content})}catch(e){return alert('保存失败: '+e.message)}
  document.getElementById('wlContent').value='';await loadAllData();renderWorkLog();
}
async function deleteWorkLog(id){if(confirm('删除？')){await sbDelete('work_logs',id);await loadAllData();renderWorkLog()}}

// ==================== INIT ====================
function initApp(){document.getElementById('recapDate').value=today();switchPage('scripts')}
</script>
