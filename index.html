<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎛️ 直播运营工作台</title>
<script src="chart.min.js"></script>
<style>
:root {
  --accent: #e74c3c; --accent-light: #fce4e4; --green: #27ae60; --green-light: #e8f5e9;
  --blue: #2980b9; --blue-light: #e3f2fd; --orange: #f39c12; --orange-light: #fff8e1;
  --bg: #f8f9fa; --card: #fff; --text: #1a1a1a; --text2: #666; --border: #e0e0e0;
  --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px}
.login-overlay h1{font-size:24px}
.login-overlay input{padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:16px;width:280px;text-align:center;font-family:inherit}
.login-overlay input:focus{outline:none;border-color:var(--accent)}
.login-overlay button{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.login-overlay .error{color:var(--accent);font-size:14px}
.login-overlay .hint{color:var(--text2);font-size:12px}
.top-nav{display:flex;justify-content:center;gap:4px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow);flex-wrap:wrap}
.top-nav button{padding:8px 16px;border:none;background:transparent;border-radius:20px;cursor:pointer;font-size:14px;color:var(--text2);transition:all .2s;font-weight:500;white-space:nowrap}
.top-nav button.active{background:var(--accent);color:#fff;font-weight:600}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100}
.bottom-nav button{flex:1;padding:8px 2px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav button .icon{font-size:18px}
.bottom-nav button.active{color:var(--accent);font-weight:600}
.page-container{max-width:800px;margin:0 auto;padding:16px}
.page{display:none}
.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--text2)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;margin-bottom:4px;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-green{background:var(--green);color:#fff}
.script-card,.light-card,.streamer-card{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.script-card .sc-title{font-weight:600;font-size:14px;margin-bottom:4px}
.script-card .sc-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
.script-card .sc-actions{display:flex;gap:6px}
.chip{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.chip-red{background:var(--accent-light);color:var(--accent)}
.chip-green{background:var(--green-light);color:var(--green)}
.chip-blue{background:var(--blue-light);color:var(--blue)}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag-row button{padding:4px 12px;border:1px solid var(--border);background:#fff;border-radius:14px;cursor:pointer;font-size:12px;font-family:inherit}
.tag-row button.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
.recap-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.recap-metric{background:var(--bg);padding:12px;border-radius:8px;text-align:center}
.recap-metric .rm-val{font-size:22px;font-weight:700;color:var(--accent)}
.recap-metric .rm-label{font-size:11px;color:var(--text2);margin-top:2px}
.chart-wrapper{position:relative;height:260px;margin:12px 0}
.hourly-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px}
@media(min-width:768px){.hourly-grid{grid-template-columns:repeat(8,1fr)}}
.hourly-item{text-align:center}
.hourly-item input{width:100%;padding:6px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:13px}
.hourly-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:2px}
.worklog-entry{border-left:3px solid var(--accent);padding:8px 12px;margin-bottom:8px;background:var(--bg);border-radius:0 8px 8px 0}
.worklog-entry .wl-time{font-size:11px;color:var(--text2)}
.worklog-entry .wl-content{font-size:13px;margin-top:3px}
.status-bar{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text2);padding:4px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.status-bar .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.status-bar .dot.online{background:var(--green)}
.status-bar .dot.offline{background:var(--orange)}
@media(max-width:640px){
  .top-nav{display:none}.bottom-nav{display:flex}.page-container{padding:10px}.card{padding:14px}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .recap-metrics{grid-template-columns:1fr 1fr}.hourly-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <h1>🎛️ 运营工作台</h1>
  <input type="password" id="loginPassword" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">🔓 登录</button>
  <div class="error" id="loginError"></div>
  <div class="hint">默认密码：admin123</div>
</div>

<div class="status-bar" id="statusBar" style="display:none">
  <span><span class="dot online" id="syncDot"></span> <span id="syncStatus">已同步</span></span>
  <span><span id="currentUser"></span> · <a href="#" onclick="logout()" style="color:var(--accent)">退出</a></span>
</div>

<nav class="top-nav" id="topNav" style="display:none">
  <button data-page="scripts" class="active">🎤 话术库</button>
  <button data-page="lighting">💡 灯光库</button>
  <button data-page="streamers">📊 主播</button>
  <button data-page="recap">📝 复盘</button>
  <button data-page="worklog">📋 日志</button>
  <button data-page="settings">⚙️ 设置</button>
</nav>

<div class="page-container">

<div class="page active" id="page-scripts">
  <div class="card"><h2>🎤 话术库</h2>
    <div class="tag-row" id="scriptCatTags"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="scriptSearch" placeholder="🔍 搜索..." style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px" oninput="renderScripts()">
      <button class="btn btn-outline btn-sm" onclick="toggleAddScript()">+ 添加</button></div>
    <div id="addScriptForm" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px">
      <div class="form-group"><label>场景分类</label><select id="newScriptCat"></select></div>
      <div class="form-group"><label>话术标题</label><input type="text" id="newScriptTitle"></div>
      <div class="form-group"><label>话术内容</label><textarea id="newScriptBody" rows="3"></textarea></div>
      <button class="btn btn-primary btn-sm" onclick="addScript()">保存</button></div>
    <div id="scriptList"></div></div>
</div>

<div class="page" id="page-lighting">
  <div class="card"><h2>💡 灯光方案库</h2>
    <button class="btn btn-outline btn-sm" style="margin-bottom:12px" onclick="toggleAddLight()">+ 添加方案</button>
    <div id="addLightForm" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px">
      <div class="form-group"><label>方案名称</label><input type="text" id="newLightName"></div>
      <div class="form-group"><label>适合风格</label><input type="text" id="newLightStyle"></div>
      <div class="form-row"><div class="form-group"><label>主灯</label><input type="text" id="newLightMain"></div><div class="form-group"><label>辅灯</label><input type="text" id="newLightFill"></div></div>
      <div class="form-row"><div class="form-group"><label>轮廓灯</label><input type="text" id="newLightRim"></div><div class="form-group"><label>美颜参数</label><input type="text" id="newLightBeauty"></div></div>
      <div class="form-group"><label>备注</label><textarea id="newLightNote" rows="2"></textarea></div>
      <button class="btn btn-primary btn-sm" onclick="addLight()">保存方案</button></div>
    <div id="lightList"></div></div>
</div>

<div class="page" id="page-streamers">
  <div class="card"><h2>📊 主播管理</h2>
    <button class="btn btn-outline btn-sm" style="margin-bottom:12px" onclick="toggleAddStreamer()">+ 添加主播</button>
    <div id="addStreamerForm" style="display:none;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px">
      <div class="form-row"><div class="form-group"><label>主播昵称</label><input type="text" id="newStreamerName"></div>
      <div class="form-group"><label>平台</label><select id="newStreamerPlatform"><option>抖音</option><option>快手</option><option>B站</option><option>视频号</option></select></div></div>
      <div class="form-group"><label>备注</label><input type="text" id="newStreamerNote"></div>
      <button class="btn btn-primary btn-sm" onclick="addStreamer()">添加</button></div>
    <div id="streamerList"></div></div>
</div>

<div class="page" id="page-recap">
  <div class="card"><h2>📝 每日复盘</h2>
    <div class="form-row"><div class="form-group"><label>主播</label><select id="recapStreamer" onchange="onRecapChange()"></select></div>
    <div class="form-group"><label>日期</label><input type="date" id="recapDate" onchange="onRecapChange()"></div></div>
    <details style="margin-bottom:12px;font-size:13px;color:var(--text2)"><summary>🤖 AI 生成设置（可选）</summary>
      <div style="margin-top:8px"><div class="form-row"><div class="form-group"><label>AI 模型</label><select id="aiModel" onchange="onAiModelChange()">
        <option value="claude">Claude</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option><option value="custom">自定义</option></select></div>
      <div class="form-group"><label>API Key</label><div style="display:flex;gap:6px"><input type="password" id="apiKey" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px"><button class="btn btn-outline btn-sm" onclick="saveApiKey()">保存</button></div></div></div>
      <div id="customEndpointRow" style="display:none"><div class="form-row"><div class="form-group"><label>API 地址</label><input type="text" id="customEndpoint"></div><div class="form-group"><label>模型名</label><input type="text" id="customModel"></div></div></div></div></details>
    <h3>📊 基础数据</h3>
    <div class="form-row-3"><div class="form-group"><label>场观</label><input type="number" id="recapViews"></div><div class="form-group"><label>峰值在线</label><input type="number" id="recapPeak"></div><div class="form-group"><label>停留(秒)</label><input type="number" id="recapStay"></div></div>
    <div class="form-row-3"><div class="form-group"><label>新增粉丝</label><input type="number" id="recapFans"></div><div class="form-group"><label>礼物收入(元)</label><input type="number" id="recapIncome"></div><div class="form-group"><label>付费人数</label><input type="number" id="recapPayers"></div></div>
    <h3>🎁 礼物拆解</h3><div class="form-row"><div class="form-group"><label>大礼物个数</label><input type="number" id="recapBigGift"></div><div class="form-group"><label>大礼物总额</label><input type="number" id="recapBigGiftAmt"></div></div>
    <h3>🆚 PK记录</h3><div class="form-row"><div class="form-group"><label>PK次数</label><input type="number" id="recapPKCount"></div><div class="form-group"><label>赢几场</label><input type="number" id="recapPKWin"></div></div>
    <h3>📈 在线人数（每小时取点）</h3><div class="hourly-grid" id="hourlyGrid"></div>
    <div class="form-row" style="margin-top:8px"><div class="form-group"><label>峰值时间</label><input type="time" id="recapPeakTime"></div><div class="form-group"><label>低谷时间</label><input type="time" id="recapLowTime"></div></div>
    <h3>🔑 关键时间节点</h3><div id="keyMoments"><div class="form-row" style="margin-bottom:4px"><div class="form-group"><input type="time" class="km-time"></div><div class="form-group"><input type="text" class="km-event" placeholder="发生了什么"></div></div></div>
    <button class="btn btn-outline btn-sm" onclick="addKeyMoment()" style="margin-bottom:12px">+ 加节点</button>
    <div style="display:flex;gap:8px;margin-bottom:16px"><button class="btn btn-primary" onclick="generateReview()">🤖 生成复盘报告</button><button class="btn btn-outline" onclick="autoFillYesterday()">📥 预填昨天</button></div></div>
  <div class="card" id="generatedReviewCard" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="margin:0">📋 复盘报告</h2><button class="btn btn-green btn-sm" onclick="copyReview()">📋 一键复制</button></div><div id="generatedReview" style="line-height:1.8;font-size:14px;white-space:pre-wrap"></div><button class="btn btn-primary" onclick="saveRecap()" style="margin-top:12px">💾 保存复盘</button></div>
  <div class="card"><h3>📈 7天趋势</h3><div class="chart-wrapper"><canvas id="recapChart"></canvas></div></div>
  <div class="card"><h3>📋 复盘历史</h3><div id="recapHistory"></div></div>
</div>

<div class="page" id="page-worklog">
  <div class="card"><h2>📋 工作日志 — <span id="wlDate"></span></h2>
    <div style="display:flex;gap:8px;margin-bottom:12px"><input type="time" id="wlTime" style="padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px"><input type="text" id="wlContent" placeholder="做了什么..." style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px"><button class="btn btn-green btn-sm" onclick="addWorkLog()">+</button></div>
    <div id="workLogList"></div></div>
</div>

<div class="page" id="page-settings">
  <div class="card"><h2>🔒 修改密码</h2>
    <div class="form-group"><label>旧密码</label><input type="password" id="oldPassword" placeholder="输入当前密码"></div>
    <div class="form-group"><label>新密码</label><input type="password" id="newPassword" placeholder="新密码（至少4位）"></div>
    <button class="btn btn-primary" onclick="changePassword()">🔒 修改密码</button></div>
  <div class="card"><h2>💾 数据备份</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">导出所有数据为 JSON 文件。网站出问题时可重新导入恢复。</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="exportBackup()" style="flex:1">📤 导出备份</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFileInput').click()" style="flex:1">📥 导入恢复</button>
    </div>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importBackup(this)">
    <p id="importStatus" style="font-size:12px;color:var(--text2);margin-top:8px"></p></div>
  <div class="card"><button class="btn btn-outline" onclick="logout()" style="width:100%;color:var(--accent);border-color:var(--accent)">🚪 退出登录</button></div>
</div>

</div>

<nav class="bottom-nav" id="bottomNav" style="display:none">
  <button data-page="scripts" class="active"><span class="icon">🎤</span>话术</button>
  <button data-page="lighting"><span class="icon">💡</span>灯光</button>
  <button data-page="streamers"><span class="icon">📊</span>主播</button>
  <button data-page="recap"><span class="icon">📝</span>复盘</button>
  <button data-page="worklog"><span class="icon">📋</span>日志</button>
  <button data-page="settings"><span class="icon">⚙️</span>设置</button>
</nav>

<script>
function escapeHtml(str) {
  if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function sanitizeError(e){var m=(e.message||String(e)).slice(0,100);var l=m.toLowerCase();if(l.includes('fetch')||l.includes('network')||l.includes('failed'))return'网络连接失败，请检查网络';if(l.includes('401')||l.includes('403')||l.includes('unauthorized')||l.includes('jwt')){forceLogout();return'会话过期，请重新登录';}return'操作失败: '+m;}

var SB_URL='https://xyeecqpbaxzjrbukipyi.supabase.co';
var SB_KEY='sb_publishable_vtschTBXX1hOhJ0BYLbOag_jsU2yL4m';

function getToken(){return sessionStorage.getItem('liveops_token')||'';}

async function callRpc(fnName,params){
  var h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
  var r=await fetch(SB_URL+'/rest/v1/rpc/'+fnName,{method:'POST',headers:h,body:JSON.stringify(params)});
  if(!r.ok){if(r.status===401||r.status===403){forceLogout();throw new Error('会话过期');}throw new Error(await r.text());}
  return r.json();
}

var loggedIn=false;
var D={scripts:[],lighting:[],streamers:[],recaps:[],workLogs:{}};
var LOGIN_COOLDOWN=0;

document.addEventListener('DOMContentLoaded',function(){document.getElementById('loginError').textContent='⏳ 连接中...';checkSession();});

async function doLogin(){
  if(LOGIN_COOLDOWN>Date.now()){document.getElementById('loginError').textContent='⏳ 请稍等几秒再试';return;}
  var pw=document.getElementById('loginPassword').value;if(!pw)return;
  document.getElementById('loginError').textContent='⏳ 验证中...';
  try{
    var token=await callRpc('login',{password_text:pw});
    if(!token){LOGIN_COOLDOWN=Date.now()+3000;document.getElementById('loginError').textContent='❌ 密码错误';return;}
    sessionStorage.setItem('liveops_token',token);
    LOGIN_COOLDOWN=0;await onAuthSuccess();
  }catch(e){LOGIN_COOLDOWN=Date.now()+5000;document.getElementById('loginError').textContent=sanitizeError(e);}
}

function forceLogout(){sessionStorage.removeItem('liveops_token');loggedIn=false;document.getElementById('loginOverlay').style.display='flex';document.getElementById('statusBar').style.display='none';document.getElementById('topNav').style.display='none';document.getElementById('bottomNav').style.display='none';document.getElementById('loginError').textContent='会话已过期，请重新登录';}

async function logout(){try{if(getToken())await callRpc('logout_fn',{});}catch(e){}sessionStorage.removeItem('liveops_token');location.reload();}

async function changePassword(){
  var op=document.getElementById('oldPassword').value.trim(),np=document.getElementById('newPassword').value.trim();
  if(!op)return alert('请输入旧密码');if(!np)return alert('请输入新密码');if(np.length<4)return alert('密码至少4位');if(op===np)return alert('新旧密码不能相同');
  try{var ok=await callRpc('change_pw',{tok:getToken(),old_password:op,new_password:np});if(ok)alert('✅ 密码已修改！');else alert('❌ 旧密码错误');document.getElementById('oldPassword').value='';document.getElementById('newPassword').value='';}
  catch(e){alert(sanitizeError(e));}
}

async function exportBackup(){
  var tok=getToken();
  try{
    var data=await Promise.all([
      callRpc('api_scripts_list',{tok:tok}),
      callRpc('api_lighting_list',{tok:tok}),
      callRpc('api_streamers_list',{tok:tok}),
      callRpc('api_recaps_list',{tok:tok}),
      callRpc('api_work_logs_list',{tok:tok})
    ]);
    var backup={scripts:data[0],lighting:data[1],streamers:data[2],recaps:data[3],work_logs:data[4],exported_at:new Date().toISOString()};
    var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
    alert('✅ 已导出');
  }catch(e){alert(sanitizeError(e));}
}

function importBackup(input){
  var f=input.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var backup=JSON.parse(e.target.result);var tok=getToken(),count=0;

async function callAI(apiKey,model,r){

  else if(model==='openai'){url='https://api.openai.com/v1/chat/completions';headers={'Content-Type':'application/json','Authorization':'Bearer '+apiKey};body=JSON.stringify({model:'gpt-4o-mini',max_tokens:800,messages:[{role:'system',content:'你是直播运营复盘教练。根据数据生成300字中文复盘：数据总览、亮点、待改进、明日建议。用数据说话。'},{role:'user',content:prompt}]});}
  else{url=getCustomEp();headers={'Content-Type':'application/json','Authorization':'Bearer '+apiKey};body=JSON.stringify({model:getCustomModel()||'gpt-4o-mini',max_tokens:800,messages:[{role:'system',content:'你是直播运营复盘教练。根据数据生成300字中文复盘：数据总览、亮点、待改进、明日建议。用数据说话。'},{role:'user',content:prompt}]});}
  var resp=await fetch(url,{method:'POST',headers:headers,body:body});if(!resp.ok){var err=await resp.text();throw new Error(err.slice(0,150));}

function ruleBasedReview(r){
  var prev=findPrev(r.streamer,r.date),rep='📊 '+escapeHtml(r.streamer)+' · '+escapeHtml(r.date)+' 复盘\n'+'─'.repeat(40)+'\n\n📈 数据\n场观'+r.views+(prev?'('+pct(r.views,prev.views)+')':'')+' 峰值'+r.peak+'人 停留'+r.stay+'s 粉'+r.fans+' 收入¥'+r.income+' 付费'+r.payers+'人';
  if(r.big_gift)rep+=' 大礼'+r.big_gift+'个/¥'+r.big_gift_amt;if(r.pk_count)rep+=' PK'+r.pk_count+'场赢'+r.pk_win;
  var hl=[],is=[];if(prev){if(r.income>prev.income*1.2)hl.push('收入大涨'+pct(r.income,prev.income));if(r.income<prev.income*.8)is.push('收入下滑'+pct(r.income,prev.income));if(r.stay>prev.stay*1.1)hl.push('停留提升');if(r.stay<prev.stay*.9)is.push('停留下降');}

  if(is.length)rep+='\n\n⚠️待改进\n'+is.map(function(i){return'❌'+i;}).join('\n');
  return rep+'\n\n💡建议：保持灯光质量，准备互动话题，主动引导礼物。\n'+'─'.repeat(40)+'\n📝补充笔记：\n（手动填写...）';

  var td=today();document.getElementById('wlDate').textContent=td;document.getElementById('wlTime').value=new Date().toTimeString().slice(0,5);
  var logs=D.workLogs[td]||[];
  document.getElementById('workLogList').innerHTML=logs.map(function(l){return'<div class="worklog-entry"><div class="wl-time">'+escapeHtml(l.time)+'</div><div class="wl-content">'+escapeHtml(l.content)+'</div><button class="btn btn-sm" style="color:var(--accent);margin-top:4px" onclick="deleteWorkLog('+l.id+')">删除</button></div>';}).join('')||'<p style="text-align:center;color:var(--text2);padding:20px">暂无记录</p>';
}
async function addWorkLog(){
  var td=today(),time=document.getElementById('wlTime').value,content=document.getElementById('wlContent').value.trim();
  if(!time||!content)return;
  try{await callRpc('api_work_logs_add',{tok:getToken(),date_:td,time_:time,content_:content});}catch(e){return alert(sanitizeError(e));}
  document.getElementById('wlContent').value='';await loadAllData();renderWorkLog();
}
async function deleteWorkLog(id){if(!confirm('删除？'))return;try{await callRpc('api_work_logs_del',{tok:getToken(),id_:id});await loadAllData();renderWorkLog();}catch(e){alert(sanitizeError(e));}}

function initApp(){document.getElementById('recapDate').value=today();switchPage('scripts');}
</script>
</body>
</html>
